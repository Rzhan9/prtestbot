name: 'PR Test Coverage Review Agent'
description: 'Analyze PR diffs and suggest missing tests using LLMs'
branding:
  icon: 'check-square'
  color: 'blue'
inputs:
  llm_api_key:
    description: 'API key for Gemini, Anthropic, or OpenAI'
    required: true
  llm_provider:
    description: 'LLM provider to use (gemini, anthropic, openai)'
    required: false
    default: 'gemini'
  llm_model:
    description: 'Specific LLM model to use (e.g., gemini-2.5-flash, claude-sonnet-4-5-20250929, gpt-4o)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ github.action_path }}/test-coverage-agent/requirements.txt

    - name: Run Test Coverage Review Agent
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        LLM_PROVIDER: ${{ inputs.llm_provider }}
        LLM_MODEL: ${{ inputs.llm_model }}
        PYTHONPATH: ${{ github.action_path }}/test-coverage-agent/src
      run: |
        python ${{ github.action_path }}/test-coverage-agent/src/test_coverage_agent/main.py
